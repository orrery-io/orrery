name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify versions match tag
        run: |
          set -e
          TAG="${GITHUB_REF_NAME#v}"
          for crate in orrery-types orrery-client orrery-worker; do
            VER=$(cargo metadata --no-deps --format-version 1 | jq -r ".packages[] | select(.name == \"$crate\") | .version")
            if [ "$VER" != "$TAG" ]; then
              echo "ERROR: $crate version $VER does not match tag $TAG"
              exit 1
            fi
          done
          echo "All versions match tag $TAG"

      - name: Publish orrery-types
        run: cargo publish -p orrery-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index orrery-types
        run: sleep 30

      - name: Publish orrery-client
        run: cargo publish -p orrery-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index orrery-client
        run: sleep 30

      - name: Publish orrery-worker
        run: cargo publish -p orrery-worker
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
