name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      typescript: ${{ steps.filter.outputs.typescript }}
      clojure: ${{ steps.filter.outputs.clojure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.sqlx/**'
            typescript:
              - 'sdks/typescript/**'
            clojure:
              - 'sdks/clojure/**'

  ci:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        env:
          SQLX_OFFLINE: "true"

      - name: Run tests
        run: cargo test --workspace --all-features
        env:
          SQLX_OFFLINE: "true"

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'sdks/typescript/.nvmrc'

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Lint
        working-directory: sdks/typescript
        run: npx tsc --noEmit

      - name: Test
        working-directory: sdks/typescript
        run: npm test

      - name: Build
        working-directory: sdks/typescript
        run: npm run build

  clojure:
    name: Clojure SDK
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.clojure == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: clojure-${{ hashFiles('sdks/clojure/deps.edn') }}
          restore-keys: clojure-

      - name: Lint
        working-directory: sdks/clojure
        run: clojure -M:lint

      - name: Test
        working-directory: sdks/clojure
        run: clojure -M:test

      - name: Build
        working-directory: sdks/clojure
        run: clojure -T:build jar
