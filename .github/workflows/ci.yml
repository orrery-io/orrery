name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude orrery-ui --all-targets --all-features -- -D warnings
        env:
          SQLX_OFFLINE: "true"

      - name: Run tests
        run: cargo test --workspace --exclude orrery-ui --all-features
        env:
          SQLX_OFFLINE: "true"
